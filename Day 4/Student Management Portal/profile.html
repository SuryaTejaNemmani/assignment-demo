<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Student Management Portal</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container my-5">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-4">
                    <div class="card shadow text-center border-0">
                        <div class="card-body">
                            <img
                                src="https://via.placeholder.com/150"
                                class="rounded-circle mb-3 border border-3 border-primary"
                                alt="Profile Image"
                            />
                            <h3 class="card-title">John Doe</h3>
                            <p class="text-muted mb-1">Roll No: 101</p>
                            <p class="text-muted mb-3">
                                Branch: Computer Science
                            </p>

                            <ul
                                class="list-group list-group-flush text-start mb-3"
                            >
                                <li class="list-group-item">
                                    <strong>Email:</strong> john.doe@example.com
                                </li>
                                <li class="list-group-item">
                                    <strong>Mobile:</strong> +1 234 567 890
                                </li>
                            </ul>

                            <button
                                class="btn btn-primary"
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#moreInfo"
                            >
                                Show Academic Details
                            </button>

                            <div class="collapse mt-3" id="moreInfo">
                                <div class="card card-body text-start bg-light">
                                    CGPA: 8.5 <br />
                                    Status: Active <br />
                                    Semester: 6th
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
