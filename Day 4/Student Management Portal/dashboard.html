<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Student Management Portal</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container my-5">
            <h2 class="mb-4">Admin Dashboard</h2>

            <div class="row g-3 mb-4">
                <div class="col-md-3 col-sm-6">
                    <div class="card text-bg-primary text-center p-3">
                        <h4>Total Students</h4>
                        <h2>1,250</h2>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="card text-bg-success text-center p-3">
                        <h4>Present Today</h4>
                        <h2>1,100</h2>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="card text-bg-warning text-center p-3">
                        <h4>Absent Today</h4>
                        <h2>150</h2>
                    </div>
                </div>
                <div class="col-md-3 col-sm-6">
                    <div class="card text-bg-info text-center p-3">
                        <h4>Placements</h4>
                        <h2>85%</h2>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm">
                <div
                    class="card-header bg-white d-flex justify-content-between align-items-center"
                >
                    <h5 class="mb-0">Recent Students</h5>
                    <input
                        type="text"
                        class="form-control w-25"
                        placeholder="Search..."
                    />
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover table-striped mb-0">
                            <thead class="table-dark">
                                <tr>
                                    <th>Roll No</th>
                                    <th>Name</th>
                                    <th>Branch</th>
                                    <th>Attendance</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>101</td>
                                    <td>John Doe</td>
                                    <td>CS</td>
                                    <td>
                                        <span class="badge bg-success"
                                            >Present</span
                                        >
                                    </td>
                                    <td>
                                        <a
                                            href="profile.html"
                                            class="btn btn-sm btn-outline-info"
                                            >View</a
                                        >
                                    </td>
                                </tr>
                                <tr>
                                    <td>102</td>
                                    <td>Jane Smith</td>
                                    <td>IT</td>
                                    <td>
                                        <span class="badge bg-danger"
                                            >Absent</span
                                        >
                                    </td>
                                    <td>
                                        <a
                                            href="profile.html"
                                            class="btn btn-sm btn-outline-info"
                                            >View</a
                                        >
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
