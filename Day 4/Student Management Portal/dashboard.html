<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dashboard</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body onload="loadTable()">
        <div class="container-fluid text-center center mt-2">
            <h1>Welcome to the Dashboard</h1>
        </div>
        <div class="container-fluid m-4">
            <div class="row justify-content-center">
                <div
                    class="card shadow col-6 col-sm-5 col-md-4 col-lg-3 col-xl-2 p-auto text-center me-2 bg-primary py-4 text-light mt-2"
                >
                    <h2 class="card-title">Total Students</h2>
                    <h3 class="card-text">1604</h3>
                </div>
                <div
                    class="card shadow col-6 col-sm-5 col-md-4 col-lg-3 col-xl-2 p-auto text-center me-2 bg-success py-4 text-light mt-2"
                >
                    <h2 class="card-title">Present</h2>
                    <h3 class="card-text">1104</h3>
                </div>
                <div
                    class="card shadow col-6 col-sm-5 col-md-4 col-lg-3 col-xl-2 p-auto text-center me-2 bg-warning py-4 mt-2"
                >
                    <h2 class="card-title">Absent</h2>
                    <h3 class="card-text">500</h3>
                </div>
                <div
                    class="card shadow col-6 col-sm-5 col-md-4 col-lg-3 col-xl-2 p-auto text-center bg-info py-4 mt-2"
                >
                    <h2 class="card-title">Placements</h2>
                    <h3 class="card-text">1223</h3>
                </div>
            </div>
        </div>

        <div class="container-fluid">
            <div class="row justify-content-center">
                <form class="col-8 col-md-6 col-lg-4 col-xl-3 d-flex">
                    <label for="search" class="form-label me-2 mt-2"
                        >Search:</label
                    >
                    <input
                        type="text"
                        class="form-control"
                        id="search"
                        placeholder="Search here..."
                    />
                </form>
            </div>
            <div class="row justify-content-center mt-2">
                <div class="col-10 col-lg-8 col-xl-6 text-center">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr class="table-warning">
                                <th scope="col">Roll No</th>
                                <th scope="col">Name</th>
                                <th scope="col">Branch</th>
                                <th scope="col">Attendance</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                    <p id="empty" class="text-danger f-4"></p>
                </div>
            </div>
        </div>

        <script>
            let table = document.getElementById("tableBody");
            let searchInput = document.getElementById("search");
            let msg = document.getElementById("empty");
            let list = [
                [1, "Surya", "CSE", 75.0],
                [2, "abc", "ECE", 89.2],
                [3, "xyz", "EEE", 68.2],
                [4, "pqr", "CIVIL", 74.3],
                [5, "cde", "MECH", 45.9],
                [6, "abcxyz", "CSE", 90.5],
                [7, "pqrabc", "CIVIL", 20.4],
                [8, "cdeghi", "ECE", 95.9],
                [9, "Teja", "EEE", 100],
                [10, "Surya Teja", "MECH", 74.9],
            ];

            let display = list;

            searchInput.addEventListener("input", (event) => {
                display = [];
                const search = event.target.value.toLowerCase();

                list.forEach((li) => {
                    if (
                        li[1].includes(search) ||
                        (!isNaN(Number(search)) && parseFloat(search) < li[3])
                    ) {
                        display.push(li);
                    }
                });

                loadTable();
            });

            const loadTable = () => {
                table.innerHTML = "";
                msg.textContent = "";
                if (display.length == 0) {
                    msg.textContent = "--No Matches found--";
                    return;
                }
                for (let li of display) {
                    let tr = document.createElement("tr");
                    let td1 = document.createElement("td");
                    let td2 = document.createElement("td");
                    let td3 = document.createElement("td");
                    let td4 = document.createElement("td");

                    td1.textContent = li[0];
                    td2.textContent = li[1];
                    td3.textContent = li[2];
                    td4.textContent = li[3];

                    tr.append(td1);
                    tr.append(td2);
                    tr.append(td3);
                    tr.append(td4);

                    table.appendChild(tr);
                }
            };
        </script>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
